name: Publish Docker image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Neokikoeru Version'
        type: string
        default: '0.0.0'

permissions:
  contents: read
  packages: write

env:
  NEOKIKOERU_VERSION: ${{ inputs.version }}
  ZIG_VERSION: 0.15.2
  TZ: Asia/Shanghai

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          repository: ${{ secrets.GH_REPO }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
          mirror: https://zigmirror.com

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11
          cache: true
          cache_dependency_path: 'web/pnpm-lock.yaml'
          package_json_file: 'web/package.json'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Prepare
        run: npm install -g @go-task/cli

      - name: Build
        run: |
          task clean --silent
          task docker --silent

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: "linux/amd64,linux/arm64"
          push: true
          tags: |
            vscodev/neokikoeru:latest
            ghcr.io/vscodev/neokikoeru:latest
